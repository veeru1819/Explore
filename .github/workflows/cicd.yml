name: Kubernetes Auto Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: [self-hosted]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Web App Archive
      run: mvn clean package -DskipTests

    # 1. Build and Tag the image for Docker Hub
    # NOTE: Replace 'YOUR_DOCKERHUB_USERNAME' with your actual username below
    - name: Build and Push Docker Image
      run: |
        docker build -t YOUR_DOCKERHUB_USERNAME/foodcourt-tomcat:latest .
        docker push YOUR_DOCKERHUB_USERNAME/foodcourt-tomcat:latest

    # 2. Tell Kubernetes to apply the changes and refresh the pods
    - name: Deploy to Kubernetes Cluster
      run: |
        kubectl apply -f k8s-deploy.yaml
        kubectl rollout restart deployment/foodcourt-deployment
