name: Local Auto Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    # This line tells GitHub to run the steps on your local Ubuntu machine!
    runs-on: [self-hosted, local-deploy]

    steps:
    # 1. Pull the absolute latest commit changes automatically
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Recompile the fresh .war file locally
    - name: Build Web App Archive
      run: mvn clean package -DskipTests

    # 3. Rebuild the Docker image and restart the container cleanly
    - name: Recreate Docker Container
      run: |
        docker build -t foodcourt-tomcat .
        docker rm -f foodcourt-running || true
        docker run -d -p 8080:8080 --name foodcourt-running foodcourt-tomcat
